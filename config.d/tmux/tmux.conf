set -g default-terminal "tmux-256color"

set -g prefix C-j
unbind C-b
unbind C-Enter

set -g base-index 1
setw -g pane-base-index 1

set-option -g renumber-windows on

set -s escape-time 0
set-option -g mouse on

set -as terminal-features 'xterm-kitty:extkeys'
set -s extended-keys always
set -s extended-keys-format csi-u

setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Kittyから送られる独自シーケンスをUser0として認識
set -s user-keys[0] "\e[5;30012~"

# User0をOpenCodeが理解できるCtrl+EnterのCSI-uへ変換
bind-key -n User0 send-keys -H 1b 5b 31 33 3b 35 75

bind -n C-M-p select-window -t :-
bind -n C-M-n select-window -t :+
bind -n C-M-w new-window -c "#{pane_current_path}"
bind -n C-M-d detach-client

bind -n C-M-v split-window -h -c "#{pane_current_path}"
bind -n C-M-o split-window -v -c "#{pane_current_path}"

bind -n C-M-h select-pane -L
bind -n C-M-l select-pane -R
bind -n C-M-k select-pane -U
bind -n C-M-j select-pane -D

set-option -g status-position top
set -g status-interval 1

set -g status-left-length 90
set -g status-right-length 90

set -g status-left "#[fg=green]#S #[fg=yellow]#I:#P#[default]"
set -g status-right "#[fg=yellow]#(date +'%Y-%md %H:%M:%S')#[default]"

setw -g window-status-separator ""
set-option -g status-justify "left"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[fg=green]#I:#W#[default] "

